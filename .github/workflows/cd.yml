name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/brunoloureirooo/ticket-mgmt
  RESOURCE_GROUP: rg-ticket-mgmt
  ENVIRONMENT: cae-ticket-mgmt

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push identity image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/identity-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-identity:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/gateway-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:latest

      - name: Build and push ticket image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ticket-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-ticket:latest

      - name: Build and push teams image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/teams-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-teams:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            set -e

            # Creates the container app if it doesn't exist, then updates the image.
            # Secrets and env vars are managed by Terraform — this only ensures the app
            # exists so that `update` doesn't fail on first deploy.
            deploy() {
              local name=$1
              local image=$2
              local ingress=$3  # external | internal
              local port=$4

              if ! az containerapp show \
                    --name "$name" \
                    --resource-group ${{ env.RESOURCE_GROUP }} \
                    --output none 2>/dev/null; then
                echo "Creating $name (first deploy)..."
                az containerapp create \
                  --name "$name" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --environment ${{ env.ENVIRONMENT }} \
                  --image "$image" \
                  --cpu 0.25 --memory 0.5Gi \
                  --ingress "$ingress" \
                  --target-port "$port" \
                  --min-replicas 0 --max-replicas 1
              else
                az containerapp update \
                  --name "$name" \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --image "$image"
              fi
            }

            deploy ca-identity  ${{ env.IMAGE_PREFIX }}-identity:latest  internal 8080
            deploy ca-gateway   ${{ env.IMAGE_PREFIX }}-gateway:latest   external 8080
            deploy ca-ticket    ${{ env.IMAGE_PREFIX }}-ticket:latest    internal 8080
            deploy ca-teams     ${{ env.IMAGE_PREFIX }}-teams:latest     internal 8080
            deploy ca-frontend  ${{ env.IMAGE_PREFIX }}-frontend:latest  external 80
