name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/brunoloureirooo/ticket-mgmt

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push identity image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/identity-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-identity:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/gateway-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:latest

      - name: Build and push ticket image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ticket-api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-ticket:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            # Images are public on ghcr.io — no registry credentials needed
            az containerapp update \
              --name ca-identity \
              --resource-group rg-ticket-mgmt \
              --image ${{ env.IMAGE_PREFIX }}-identity:latest

            az containerapp update \
              --name ca-gateway \
              --resource-group rg-ticket-mgmt \
              --image ${{ env.IMAGE_PREFIX }}-gateway:latest

            az containerapp update \
              --name ca-ticket \
              --resource-group rg-ticket-mgmt \
              --image ${{ env.IMAGE_PREFIX }}-ticket:latest

            az containerapp update \
              --name ca-frontend \
              --resource-group rg-ticket-mgmt \
              --image ${{ env.IMAGE_PREFIX }}-frontend:latest
