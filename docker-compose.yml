services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: ticket-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ticketmanagement
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ticket-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ASP.NET Core Backend Gateway API (.NET 8)
  gateway:
    build:
      context: ./backend/gateway-api
      dockerfile: Dockerfile
    container_name: ticket-backend-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevCertPassword123!
      - IdentityApiUrl=https://ticket-backend-identity:8443
      - Sentry__Dsn=${SENTRY_DSN_GATEWAY}
      - Redis__ConnectionString=ticket-redis:6379
      - SECRET=${SECRET}
    ports:
      - "5001:8443"
    volumes:
      - ./https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped
    env_file:
      - .env

  # ASP.NET Core Backend Identity API (.NET 8)
  backend:
    build:
      context: ./backend/identity-api
      dockerfile: Dockerfile
    container_name: ticket-backend-identity
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevCertPassword123!
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=identitydb;Username=postgres;Password=${DB_PASSWORD}
      - JwtSettings__Secret=${SECRET}
      - JwtSettings__Issuer=TicketManagementAPI
      - JwtSettings__Audience=TicketManagementClient
      - JwtSettings__ExpiryMinutes=60
      - Sentry__Dsn=${SENTRY_DSN_IDENTITY}
      - Redis__ConnectionString=ticket-redis:6379
      - RabbitMQ__ConnectionString=amqp://guest:guest@ticket-rabbitmq/
    volumes:
      - ./https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped
    env_file:
      - .env

  # ASP.NET Core Backend Ticket API (.NET 8)
  ticket:
    build:
      context: ./backend/ticket-api
      dockerfile: Dockerfile
    container_name: ticket-backend-ticket
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevCertPassword123!
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=ticketdb;Username=postgres;Password=${DB_PASSWORD}
      - RabbitMQ__ConnectionString=amqp://guest:guest@ticket-rabbitmq/
      - Sentry__Dsn=${SENTRY_DSN_TICKET}
    volumes:
      - ./https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped
    env_file:
      - .env

  # ASP.NET Core Backend Teams API (.NET 8)
  teams:
    build:
      context: ./backend/teams-api
      dockerfile: Dockerfile
    container_name: ticket-backend-teams
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8443
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=DevCertPassword123!
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=teamsdb;Username=postgres;Password=${DB_PASSWORD}
      - RabbitMQ__ConnectionString=amqp://guest:guest@ticket-rabbitmq/
      - Sentry__Dsn=${SENTRY_DSN_TEAMS}
    volumes:
      - ./https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ticket-network
    restart: unless-stopped
    env_file:
      - .env

  # RabbitMQ — async messaging between services
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ticket-rabbitmq
    ports:
      - "15672:15672"
    networks:
      - ticket-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — token revocation blocklist, permission hash cache, rate limiting
  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    networks:
      - ticket-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-frontend
    environment:
      - GATEWAY_HOST=gateway:8080
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - ticket-network
    restart: unless-stopped

  # pgAdmin Database Management Tool
  pgadmin:
    image: dpage/pgadmin4
    container_name: ticket-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ticket-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

# Persistent storage
volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local

# Network for service communication
networks:
  ticket-network:
    driver: bridge
